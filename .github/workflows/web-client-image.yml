name: web-client image

# Builds + pushes the web-client gateway (and the version-matched server) images
# to GHCR on every push to master, so the sockbowl host's watchtower auto-rolls
# them out. See Mage.Client.Web/deploy/README.md.

on:
  push:
    branches: ["vibe/xmage-claude-react-ui"]
    tags: ["v*"]
    paths:
      - "Mage.Client.Web/**"
      - "Mage.Server/**"
      - "Mage.Sets/**"
      - "Mage.Common/**"
      - "Mage/**"
      - ".github/workflows/web-client-image.yml"
  workflow_dispatch:

concurrency:
  # queue, don't cancel: with several agents merging rapidly, cancel-in-progress
  # meant the ~15min gateway build never finished. Let the running build complete;
  # GitHub keeps only the latest pending run, so :latest still converges to HEAD.
  group: web-client-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gateway:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jacob-sabella/mage-web
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Mage.Client.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Version-matched server. Heavy build (Mage.Sets); only when engine/server change.
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jacob-sabella/mage-server
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Mage.Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
