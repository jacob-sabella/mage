name: frontend check

# Fast guard (~1 min, no Docker): runs tsc + vite build so a broken refactor is
# caught on the PR/push instead of failing the slow image build. Make this a
# required status check on the branch to block broken code from merging.

on:
  push:
    branches: ["vibe/xmage-claude-react-ui"]
    paths:
      - "Mage.Client.Web/frontend/**"
  pull_request:
    paths:
      - "Mage.Client.Web/frontend/**"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mage.Client.Web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Mage.Client.Web/frontend/package-lock.json
      - run: npm ci
      - run: npm run build   # tsc -b && vite build
      - name: Playwright faux tests
        run: |
          npx playwright install --with-deps chromium
          npx playwright test --project=chromium
